name: ci

on:
  push:
  workflow_dispatch:

env:
  TERM: xterm
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - run: sudo apt-get install -y zsh

      - run: |
          curl -L https://raw.githubusercontent.com/molovo/revolver/master/revolver > /usr/local/bin/revolver
          curl -L https://github.com/zunit-zsh/zunit/releases/download/v0.8.2/zunit > /usr/local/bin/zunit
          chmod +x /usr/local/bin/revolver /usr/local/bin/zunit

      - run: zunit

  integration:
    runs-on: macos-latest
    strategy:
      matrix:
        command:
          - help
          - init
          - update
          - link
          - install-brew
          - install-defaults
          - install-fisher
          - install-vim

    steps:
      - uses: actions/checkout@v7

      - if: ${{ matrix.command == 'install-brew' }}
        run: brew update

      - if: ${{ matrix.command == 'install-brew' }}
        name: Run brew uninstall go
        run: |
          versions=$(brew list | grep -E '^go$|^go@' || true)
          echo $versions

          for v in $versions
          do
            echo "brew uninstall $v"
            brew uninstall $v
          done

      - if: ${{ matrix.command == 'install-brew' }}
        id: skip
        name: Skip mas installs
        run: |
          ids=$(cat Brewfile | grep -oE "[0-9]{9,}" | tr '\n' ' ')
          echo $ids
          echo "HOMEBREW_BUNDLE_MAS_SKIP=$ids" >> "$GITHUB_ENV"

      - run: ./dot ${{ matrix.command }}
